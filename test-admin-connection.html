<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion Admin</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input { padding: 8px; margin: 5px; width: 300px; }
    </style>
</head>
<body>
    <h1>🔐 Test de Connexion Admin</h1>
    
    <div class="test info">
        <h3>📋 Configuration</h3>
        <p><strong>URL Supabase:</strong> <span id="supabase-url">Vérification...</span></p>
        <p><strong>Clé Supabase:</strong> <span id="supabase-key">Vérification...</span></p>
    </div>

    <div class="test info">
        <h3>🔑 Test de Connexion</h3>
        <input type="email" id="email" placeholder="Email admin" value="abdoulaye@cdp.sn">
        <input type="password" id="password" placeholder="Mot de passe" value="ABDOULAHI1989">
        <br>
        <button onclick="testConnection()">Tester la Connexion</button>
        <button onclick="checkDatabase()">Vérifier la Base de Données</button>
    </div>

    <div id="results"></div>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://dpqrcrwaryzfxhujzbcr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwcXJjcndhcnl6ZnhodWp6YmNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc0NTE3OTUsImV4cCI6MjA3MzAyNzc5NX0.MnvpmaWM4rnGnzMO5vKbUjJgxohQbW3hxihxHxAhog0';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Vérifier la configuration
        document.getElementById('supabase-url').textContent = SUPABASE_URL;
        document.getElementById('supabase-key').textContent = SUPABASE_KEY ? '✅ Présente' : '❌ Manquante';

        async function testConnection() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const results = document.getElementById('results');

            results.innerHTML = '<div class="test info">🔄 Test de connexion en cours...</div>';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    results.innerHTML = `
                        <div class="test error">
                            <h3>❌ Erreur de Connexion</h3>
                            <p><strong>Message:</strong> ${error.message}</p>
                            <p><strong>Code:</strong> ${error.status}</p>
                            <h4>💡 Solutions possibles:</h4>
                            <ul>
                                <li>L'utilisateur admin n'existe pas dans la base de données</li>
                                <li>Le mot de passe est incorrect</li>
                                <li>Les scripts SQL n'ont pas été exécutés</li>
                            </ul>
                        </div>
                    `;
                } else {
                    results.innerHTML = `
                        <div class="test success">
                            <h3>✅ Connexion Réussie !</h3>
                            <p><strong>Email:</strong> ${data.user.email}</p>
                            <p><strong>ID:</strong> ${data.user.id}</p>
                        </div>
                    `;

                    // Vérifier le profil admin
                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', data.user.id)
                        .single();

                    if (profileError) {
                        results.innerHTML += `
                            <div class="test error">
                                <h3>❌ Erreur Profil</h3>
                                <p>${profileError.message}</p>
                            </div>
                        `;
                    } else {
                        results.innerHTML += `
                            <div class="test success">
                                <h3>✅ Profil Admin Trouvé</h3>
                                <p><strong>Nom:</strong> ${profile.full_name}</p>
                                <p><strong>Rôle:</strong> ${profile.role}</p>
                                ${profile.role === 'admin' ? 
                                    '<p style="color: green;">🎉 Tout fonctionne correctement !</p>' : 
                                    '<p style="color: red;">⚠️ Le rôle n\'est pas admin</p>'
                                }
                            </div>
                        `;
                    }
                }
            } catch (err) {
                results.innerHTML = `
                    <div class="test error">
                        <h3>❌ Erreur Inattendue</h3>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        async function checkDatabase() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="test info">🔄 Vérification de la base de données...</div>';

            const tables = ['profiles', 'subjects', 'courses'];
            let html = '<div class="test info"><h3>🗄️ État de la Base de Données</h3>';

            for (const table of tables) {
                try {
                    const { error } = await supabase.from(table).select('id').limit(1);
                    if (error) {
                        html += `<p>❌ Table ${table}: ${error.message}</p>`;
                    } else {
                        html += `<p>✅ Table ${table}: OK</p>`;
                    }
                } catch (err) {
                    html += `<p>❌ Table ${table}: Erreur</p>`;
                }
            }

            html += '</div>';
            results.innerHTML = html;
        }
    </script>
</body>
</html>
